<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algebra Wizard</title>
    <script>
      // Apply the saved theme before paint to avoid a flash. Defaults to dark.
      try {
        var themes = ['light', 'dark', 'midnight', 'forest', 'sunset', 'ocean'];
        var s = JSON.parse(localStorage.getItem('algebra-clone-settings') || '{}');
        var theme = themes.indexOf(s.theme) !== -1 ? s.theme : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
